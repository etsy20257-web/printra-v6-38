<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Printra Automatic Analysis</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 0; padding: 16px; background: #0f172a; color: #fff; width: 320px; }
      .card { border: 1px solid rgba(255,255,255,.12); border-radius: 16px; padding: 14px; background: rgba(255,255,255,.04); margin-bottom: 12px; }
      input, button { width: 100%; box-sizing: border-box; border-radius: 12px; padding: 10px 12px; }
      input { background: #020617; color: white; border: 1px solid rgba(255,255,255,.12); margin: 8px 0 12px; }
      button { border: 1px solid rgba(125,211,252,.35); background: rgba(14,165,233,.15); color: #e0f2fe; cursor: pointer; margin-bottom: 8px; }
      .muted { color: #cbd5e1; font-size: 12px; line-height: 1.5; }
    </style>
  </head>
  <body>
    <div class="card">
      <div style="font-size:12px; letter-spacing:.14em; text-transform:uppercase; opacity:.7;">Printra</div>
      <h3 style="margin:8px 0 0;">Automatic Analysis</h3>
      <p class="muted">Set the API base once, then use the Etsy page controls or the buttons below.</p>
      <label class="muted">API Base URL</label>
      <input id="apiBase" placeholder="http://localhost:4000" />
      <button id="saveApiBase">Save API Base</button>
      <button id="syncStatus">Sync Extension Status</button>
      <button id="analyzePage">Analyze Current Etsy Page</button>
      <div id="feedback" class="muted">Ready.</div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
